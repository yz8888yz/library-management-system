{% extends "base.html" %}

{% block title %}注册 - 图书管理系统{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 30px;">用户注册</h2>
    
    <form id="registerForm" method="POST" onsubmit="handleRegister(event)">
        <div style="margin-bottom: 20px;">
            <label for="username" style="display: block; margin-bottom: 5px; font-weight: bold;">用户名</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="email" style="display: block; margin-bottom: 5px; font-weight: bold;">邮箱</label>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="password" style="display: block; margin-bottom: 5px; font-weight: bold;">密码</label>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="password_confirm" style="display: block; margin-bottom: 5px; font-weight: bold;">确认密码</label>
            <input type="password" id="password_confirm" name="password_confirm" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="real_name" style="display: block; margin-bottom: 5px; font-weight: bold;">真实姓名（可选）</label>
            <input type="text" id="real_name" name="real_name" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 10px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">注册</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <p>已有账户？<a href="{{ url_for('main.login') }}">登录</a></p>
    </div>
</div>

<script>
function handleRegister(event) {
    event.preventDefault();
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const password_confirm = document.getElementById('password_confirm').value;
    const real_name = document.getElementById('real_name').value;
    
    if (password !== password_confirm) {
        alert('两次输入的密码不一致');
        return;
    }
    
    fetch('/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({username, email, password, real_name})
    })
    .then(response => response.json())
    .then(data => {
        if (data.code === 200) {
            alert('注册成功，请登录');
            window.location.href = '/login';
        } else {
            alert(data.message);
        }
    })
    .catch(error => console.error('Error:', error));
}
</script>
{% endblock %}
